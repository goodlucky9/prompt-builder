<!DOCTYPE html>

<head>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0F">
<title>AI 视频提示词工坊</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0D0D0F;overflow:hidden;-webkit-user-select:none;user-select:none}
  textarea,input{-webkit-user-select:text;user-select:text}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useEffect,useRef} = React;

const DEFAULT_CATEGORIES = [
  {id:"subject",label:"主体与动作",icon:"🎭",color:"#E8655A",
    tags:["一个年轻女人","一个男人","一个小孩","一位老人","一对情侣","一只猫","一只鸟","一群人","一辆汽车","一艘船","站立不动","缓缓行走","奔跑","跳舞","回头望","坐在椅子上","骑自行车","漂浮在空中","从远处走来","渐渐消失"]},
  {id:"scene",label:"场景环境",icon:"🏔",color:"#4A9B7F",
    tags:["城市街道","海边沙滩","茂密森林","雪山之巅","沙漠荒野","日式庭院","欧洲古堡","赛博朋克都市","太空星际","水下世界","室内咖啡厅","废弃工厂","樱花小路","雨中巷弄","屋顶天台","春天","夏天","秋天","冬天"]},
  {id:"lighting",label:"光线色调",icon:"💡",color:"#D4A853",
    tags:["金色晨光","柔和自然光","落日余晖","月光照耀","霓虹灯光","逆光剪影","侧光","顶光","烛光摇曳","闪电照亮","暖色调","冷色调","高对比度","低饱和度","莫兰迪色系","光影交错","丁达尔效应","体积光","柔光滤镜","阴暗低调"]},
  {id:"camera",label:"镜头运动",icon:"🎬",color:"#6B7FD7",
    tags:["特写 close-up","中景 medium shot","远景 wide shot","全景 panoramic","航拍俯瞰 aerial shot","低角度仰拍","肩上镜头 over-the-shoulder","跟踪镜头 tracking shot","环绕拍摄 orbit shot","推进 zoom in","拉远 zoom out","慢动作 slow motion","延时摄影 timelapse","手持晃动 handheld","稳定器平滑移动","一镜到底 long take","快速剪辑","旋转镜头","穿越镜头","第一人称视角 POV"]},
  {id:"style",label:"视觉风格",icon:"🎨",color:"#A862C4",
    tags:["电影感 cinematic","纪录片风格","MV风格","广告大片","35mm胶片质感","8mm复古胶片","黑白影像","赛博朋克","吉卜力动画","皮克斯3D风格","日系动漫","水彩手绘","油画质感","极简主义","超现实主义","蒸汽波 vaporwave","暗黑哥特","田园牧歌","未来科幻","中国水墨风"]},
  {id:"mood",label:"情绪氛围",icon:"✨",color:"#CF6E8A",
    tags:["宁静祥和","温暖治愈","浪漫唯美","梦幻迷离","忧郁感伤","紧张悬疑","震撼史诗","神秘诡异","欢乐活泼","孤独寂寥","充满希望","压迫窒息","自由奔放","庄严肃穆","轻松惬意","怀旧复古","空灵飘渺","热血沸腾","平静如水","末日荒凉"]},
];

const PRESETS = [
  {name:"电影感城市夜景",tags:["一个年轻女人","缓缓行走","城市街道","霓虹灯光","冷色调","跟踪镜头 tracking shot","电影感 cinematic","孤独寂寥"]},
  {name:"自然风光航拍",tags:["茂密森林","金色晨光","体积光","航拍俯瞰 aerial shot","慢动作 slow motion","电影感 cinematic","宁静祥和","震撼史诗"]},
  {name:"日系治愈动画",tags:["一个小孩","樱花小路","春天","柔和自然光","暖色调","中景 medium shot","吉卜力动画","温暖治愈"]},
  {name:"赛博朋克未来",tags:["一群人","赛博朋克都市","霓虹灯光","高对比度","低角度仰拍","赛博朋克","紧张悬疑"]},
];

const DEFAULT_FIXED_PRESETS = [
  {id:"fp_demo1",name:"3D CGI 写实风格",
    content:"建模与渲染引擎：采用高精度的3D CGI（计算机生成图像）渲染技术。材质表现遵循PBR（基于物理的渲染）标准，对光线的反射、折射（如头发的光泽、皮肤的次表面散射）处理方式一致。角色面部审美特征：人物面部比例高度同源。采用了\u201C写实物理材质+二次元夸张比例\u201D的混合设计（即大眼睛、小鼻尖、精致且无瑕疵的平滑肌肤）。这种特征常见于当前的3D动漫、游戏CG或BJD（球体关节人形）人偶，呈现出强烈的\u201C精致人造物\u201D质感。镜头语言与构图：采用了标准的单人肖像构图，并使用了强烈的浅景深（背景虚化）摄影技巧。"},
];

const COLOR_OPTIONS = ["#E8655A","#4A9B7F","#D4A853","#6B7FD7","#A862C4","#CF6E8A","#5BA8C8","#8BC34A","#FF8A65","#78909C"];
const ICON_OPTIONS = ["🎭","🏔","💡","🎬","🎨","✨","🎵","🌊","🔥","🌙","⚡","🎯","🧩","🎪","💎","🚀","🌸","🎤","📷","🖌"];

function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

/* ── Toast notification ── */
function Toast({message, visible}) {
  if (!visible) return null;
  return (
    <div style={{
      position:"fixed",bottom:32,left:"50%",transform:"translateX(-50%)",zIndex:9999,
      padding:"12px 24px",borderRadius:10,background:"rgba(74,155,127,0.95)",
      color:"#fff",fontSize:13,fontWeight:600,fontFamily:"'Noto Sans SC',sans-serif",
      boxShadow:"0 8px 32px rgba(0,0,0,0.4)",animation:"slideUp 0.25s ease",
      backdropFilter:"blur(8px)",
    }}>{message}</div>
  );
}

/* ── Modal ── */
function Modal({open, onClose, title, children, width=460}) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{width,maxWidth:"92vw",maxHeight:"85vh",overflowY:"auto",background:"#1A1A1E",borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",boxShadow:"0 24px 80px rgba(0,0,0,0.6)",padding:"24px 28px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:600,color:"#E8E6E1"}}>{title}</h3>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.06)",border:"none",color:"#888",width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:16}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const inp={width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.04)",color:"#E8E6E1",fontSize:13,outline:"none",fontFamily:"'Noto Sans SC',sans-serif",boxSizing:"border-box"};
const lbl={fontSize:12,color:"#888",marginBottom:6,display:"block",fontWeight:500};
const btnP=(c="#E8655A")=>({padding:"10px 22px",borderRadius:10,border:"none",background:c,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif"});
const btnG={padding:"10px 18px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#888",fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif"};

function PromptBuilder() {
  const [categories, setCategories] = useState(()=>loadJSON("pb-categories",DEFAULT_CATEGORIES));
  const [selected, setSelected] = useState([]);
  const [customText, setCustomText] = useState("");
  const [copied, setCopied] = useState(false);
  const [activeCategory, setActiveCategory] = useState(null);
  const [savedPresets, setSavedPresets] = useState(()=>loadJSON("pb-presets",[]));
  const [presetName, setPresetName] = useState("");
  const [showSaveInput, setShowSaveInput] = useState(false);
  const [editMode, setEditMode] = useState(false);

  const [fixedPresets, setFixedPresets] = useState(()=>loadJSON("pb-fixed-presets",DEFAULT_FIXED_PRESETS));
  const [activeFixedPresets, setActiveFixedPresets] = useState([]);
  const [hoveredFP, setHoveredFP] = useState(null);
  const [addFPModal, setAddFPModal] = useState(false);
  const [editFPModal, setEditFPModal] = useState(null);
  const [fpForm, setFpForm] = useState({name:"",content:""});
  const [fpViewModal, setFpViewModal] = useState(null);

  const [addTagModal, setAddTagModal] = useState(null);
  const [editTagModal, setEditTagModal] = useState(null);
  const [addCatModal, setAddCatModal] = useState(false);
  const [editCatModal, setEditCatModal] = useState(null);
  const [newTagText, setNewTagText] = useState("");
  const [editTagText, setEditTagText] = useState("");
  const [batchTagText, setBatchTagText] = useState("");
  const [newCat, setNewCat] = useState({label:"",icon:"🎯",color:"#5BA8C8"});
  const [editCat, setEditCat] = useState({label:"",icon:"",color:""});
  const [presetTab, setPresetTab] = useState("quick");

  // Toast
  const [toast, setToast] = useState({message:"",visible:false});
  const showToast = (msg) => { setToast({message:msg,visible:true}); setTimeout(()=>setToast({message:"",visible:false}), 2200); };

  // Settings menu
  const [showSettings, setShowSettings] = useState(false);

  // File input ref for import
  const fileInputRef = useRef(null);

  // Auto-save
  useEffect(()=>{saveJSON("pb-categories",categories);},[categories]);
  useEffect(()=>{saveJSON("pb-presets",savedPresets);},[savedPresets]);
  useEffect(()=>{saveJSON("pb-fixed-presets",fixedPresets);},[fixedPresets]);

  const toggleTag = useCallback((tag)=>{
    if(editMode) return;
    setSelected(p=>p.includes(tag)?p.filter(t=>t!==tag):[...p,tag]);
  },[editMode]);

  const fixedContents = activeFixedPresets.map(id=>fixedPresets.find(f=>f.id===id)).filter(Boolean).map(f=>f.content);
  const allParts = [...selected,...fixedContents,customText].filter(Boolean);
  const finalPrompt = allParts.join("\uFF0C")+(allParts.length?"\u3002":"");
  const hasPrompt = finalPrompt && finalPrompt !== "\u3002";

  const copyToClipboard = useCallback(()=>{
    if(!hasPrompt) return;
    navigator.clipboard.writeText(finalPrompt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1800);});
  },[finalPrompt,hasPrompt]);

  const clearAll=()=>{setSelected([]);setCustomText("");setActiveFixedPresets([]);};
  const applyPreset=(p)=>{if(editMode)return;setSelected([...p.tags]);setCustomText("");};
  const toggleFixedPreset=(id)=>{if(editMode)return;setActiveFixedPresets(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);};
  const saveCustomPreset=()=>{if(!presetName.trim()||selected.length===0)return;setSavedPresets(p=>[...p,{name:presetName.trim(),tags:[...selected]}]);setPresetName("");setShowSaveInput(false);};
  const removeTag=(tag)=>setSelected(p=>p.filter(t=>t!==tag));
  const getTagCategory=(tag)=>categories.find(c=>c.tags.includes(tag))||null;

  // Tag CRUD
  const handleAddTags=(catId)=>{const lines=batchTagText.split("\n").map(s=>s.trim()).filter(Boolean);const single=newTagText.trim();const toAdd=single?[single]:lines;if(!toAdd.length)return;setCategories(p=>p.map(c=>c.id===catId?{...c,tags:[...c.tags,...toAdd.filter(t=>!c.tags.includes(t))]}:c));setNewTagText("");setBatchTagText("");setAddTagModal(null);showToast("\u2713 \u6807\u7B7E\u5DF2\u6DFB\u52A0");};
  const handleEditTag=()=>{if(!editTagText.trim()||!editTagModal)return;const{catId,index}=editTagModal;const old=categories.find(c=>c.id===catId)?.tags[index];setCategories(p=>p.map(c=>{if(c.id!==catId)return c;const t=[...c.tags];t[index]=editTagText.trim();return{...c,tags:t};}));if(old&&selected.includes(old))setSelected(p=>p.map(t=>t===old?editTagText.trim():t));setEditTagModal(null);setEditTagText("");};
  const handleDeleteTag=(catId,index)=>{const tag=categories.find(c=>c.id===catId)?.tags[index];setCategories(p=>p.map(c=>{if(c.id!==catId)return c;const t=[...c.tags];t.splice(index,1);return{...c,tags:t};}));if(tag)setSelected(p=>p.filter(t=>t!==tag));};

  // Category CRUD
  const handleAddCategory=()=>{if(!newCat.label.trim())return;const id="custom_"+Date.now();setCategories(p=>[...p,{id,label:newCat.label.trim(),icon:newCat.icon,color:newCat.color,tags:[]}]);setNewCat({label:"",icon:"🎯",color:"#5BA8C8"});setAddCatModal(false);setActiveCategory(id);showToast("\u2713 \u5206\u7C7B\u5DF2\u521B\u5EFA");};
  const handleEditCategory=()=>{if(!editCat.label.trim()||!editCatModal)return;setCategories(p=>p.map(c=>c.id===editCatModal.id?{...c,label:editCat.label.trim(),icon:editCat.icon,color:editCat.color}:c));setEditCatModal(null);};
  const handleDeleteCategory=(catId)=>{const cat=categories.find(c=>c.id===catId);if(cat)setSelected(p=>p.filter(t=>!cat.tags.includes(t)));setCategories(p=>p.filter(c=>c.id!==catId));if(activeCategory===catId)setActiveCategory(null);};
  const handleResetAll=()=>{if(!confirm("\u786E\u8BA4\u6062\u590D\u4E3A\u9ED8\u8BA4\uFF1F\u6240\u6709\u81EA\u5B9A\u4E49\u5185\u5BB9\u5C06\u4E22\u5931\u3002"))return;setCategories(DEFAULT_CATEGORIES);setSelected([]);setSavedPresets([]);setCustomText("");setFixedPresets(DEFAULT_FIXED_PRESETS);setActiveFixedPresets([]);showToast("\u2713 \u5DF2\u6062\u590D\u9ED8\u8BA4");};
  const handleDeletePreset=(idx)=>setSavedPresets(p=>{const n=[...p];n.splice(idx,1);return n;});
  const moveCat=(from,to)=>{setCategories(p=>{const n=[...p];const[item]=n.splice(from,1);n.splice(to,0,item);return n;});};

  // Fixed preset CRUD
  const handleAddFP=()=>{if(!fpForm.name.trim()||!fpForm.content.trim())return;setFixedPresets(p=>[...p,{id:"fp_"+Date.now(),name:fpForm.name.trim(),content:fpForm.content.trim().slice(0,500)}]);setFpForm({name:"",content:""});setAddFPModal(false);showToast("\u2713 \u56FA\u5B9A\u9884\u8BBE\u5DF2\u521B\u5EFA");};
  const handleEditFP=()=>{if(!fpForm.name.trim()||!fpForm.content.trim()||!editFPModal)return;setFixedPresets(p=>p.map(f=>f.id===editFPModal.id?{...f,name:fpForm.name.trim(),content:fpForm.content.trim().slice(0,500)}:f));setEditFPModal(null);setFpForm({name:"",content:""});};
  const handleDeleteFP=(id)=>{setFixedPresets(p=>p.filter(f=>f.id!==id));setActiveFixedPresets(p=>p.filter(x=>x!==id));};

  /* ═══ EXPORT / IMPORT ═══ */
  const handleExport = () => {
    const data = {
      version: 1,
      exportDate: new Date().toISOString(),
      categories,
      savedPresets,
      fixedPresets,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "\u63D0\u793A\u8BCD\u5DE5\u574A_\u914D\u7F6E_" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("\u2713 \u914D\u7F6E\u5DF2\u5BFC\u51FA");
    setShowSettings(false);
  };

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.categories || !Array.isArray(data.categories)) {
          alert("\u6587\u4EF6\u683C\u5F0F\u4E0D\u6B63\u786E\uFF0C\u8BF7\u9009\u62E9\u6B63\u786E\u7684\u914D\u7F6E\u6587\u4EF6\u3002");
          return;
        }
        if (!confirm("\u5BFC\u5165\u5C06\u8986\u76D6\u5F53\u524D\u6240\u6709\u914D\u7F6E\uFF0C\u786E\u8BA4\u7EE7\u7EED\uFF1F")) return;
        setCategories(data.categories);
        if (data.savedPresets) setSavedPresets(data.savedPresets);
        if (data.fixedPresets) setFixedPresets(data.fixedPresets);
        setSelected([]);
        setActiveFixedPresets([]);
        setCustomText("");
        showToast("\u2713 \u914D\u7F6E\u5DF2\u5BFC\u5165");
      } catch {
        alert("\u6587\u4EF6\u89E3\u6790\u5931\u8D25\uFF0C\u8BF7\u786E\u4FDD\u9009\u62E9\u7684\u662F\u6B63\u786E\u7684JSON\u914D\u7F6E\u6587\u4EF6\u3002");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
    setShowSettings(false);
  };

  const tabStyle=(active)=>({
    padding:"6px 16px",borderRadius:7,border:"none",fontSize:12,fontWeight:active?600:400,
    cursor:"pointer",transition:"all 0.2s",fontFamily:"'Space Mono',monospace",
    background:active?"rgba(255,255,255,0.1)":"transparent",color:active?"#E8E6E1":"#666",
  });

  // Stats
  const totalTags = categories.reduce((s,c)=>s+c.tags.length, 0);
  const totalFP = fixedPresets.length;

  return (
    <div style={{minHeight:"100vh",background:"#0D0D0F",color:"#E8E6E1",fontFamily:"'Noto Sans SC','SF Pro Display',-apple-system,sans-serif",padding:0}}>
      {/* Hidden file input */}
      <input type="file" ref={fileInputRef} accept=".json" style={{display:"none"}} onChange={handleImport} />

      {/* Toast */}
      <Toast message={toast.message} visible={toast.visible} />

      {/* Header */}
      <div style={{padding:"18px 24px 12px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"linear-gradient(180deg,rgba(255,255,255,0.03) 0%,transparent 100%)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:9,background:"linear-gradient(135deg,#E8655A,#D4A853,#6B7FD7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff",fontFamily:"'Space Mono',monospace"}}>P</div>
          <div>
            <h1 style={{margin:0,fontSize:19,fontWeight:700,letterSpacing:"-0.02em",background:"linear-gradient(90deg,#E8E6E1,#A0A0A0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AI 视频提示词工坊</h1>
            <p style={{margin:0,fontSize:10,color:"#555",letterSpacing:"0.08em",fontFamily:"'Space Mono',monospace"}}>PROMPT BUILDER · PWA</p>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {/* Settings dropdown */}
          <div style={{position:"relative"}}>
            <button onClick={()=>setShowSettings(s=>!s)} style={{
              padding:"8px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",
              background:"rgba(255,255,255,0.04)",color:"#999",fontSize:16,cursor:"pointer",transition:"all 0.2s",
            }} title="\u8BBE\u7F6E">
              \u2630
            </button>
            {showSettings && (
              <div style={{
                position:"absolute",right:0,top:"calc(100% + 8px)",width:220,
                background:"#1E1E22",borderRadius:12,border:"1px solid rgba(255,255,255,0.1)",
                boxShadow:"0 16px 48px rgba(0,0,0,0.5)",zIndex:100,overflow:"hidden",
                animation:"fadeIn 0.15s ease",
              }}>

        <div style={{marginBottom:16}}><label style={lbl}>预设名称</label><input value={fpForm.name} onChange={e=>setFpForm(p=>({...p,name:e.target.value}))} style={inp} autoFocus /></div>
        <div style={{marginBottom:8}}><label style={lbl}>预设内容（500字以内）</label>
          <textarea value={fpForm.content} onChange={e=>setFpForm(p=>({...p,content:e.target.value.slice(0,500)}))} rows={10} style={{...inp,resize:"vertical",lineHeight:1.7}} />
          <div style={{fontSize:11,color:fpForm.content.length>=480?"#E8655A":"#555",textAlign:"right",marginTop:4,fontFamily:"'Space Mono',monospace"}}>{fpForm.content.length}/500</div>
        </div>
        <button onClick={handleEditFP} style={{...btnP("#5BA8C8"),width:"100%"}}>保存修改</button>
      </Modal>

      <Modal open={!!fpViewModal} onClose={()=>setFpViewModal(null)} title={fpViewModal?"📌 "+fpViewModal.name:""} width={520}>
        <div style={{padding:"16px",borderRadius:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",fontSize:13,lineHeight:1.9,color:"#ccc",fontFamily:"'Noto Sans SC',sans-serif",whiteSpace:"pre-wrap"}}>{fpViewModal?.content}</div>
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={()=>{navigator.clipboard.writeText(fpViewModal?.content||"");setFpViewModal(null);showToast("\u2713 \u5185\u5BB9\u5DF2\u590D\u5236");}} style={{...btnP("#5BA8C8"),flex:1}}>📋 复制内容</button>
          <button onClick={()=>setFpViewModal(null)} style={btnG}>关闭</button>
        </div>
      </Modal>

      <Modal open={!!addTagModal} onClose={()=>setAddTagModal(null)} title="添加标签">
        <div style={{marginBottom:16}}><label style={lbl}>单个添加</label>
          <div style={{display:"flex",gap:8}}>
            <input value={newTagText} onChange={e=>setNewTagText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAddTags(addTagModal)} placeholder="输入标签内容..." style={{...inp,flex:1}} autoFocus />
            <button onClick={()=>handleAddTags(addTagModal)} style={btnP(categories.find(c=>c.id===addTagModal)?.color)}>添加</button>
          </div>
        </div>
        <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:16}}><label style={lbl}>批量添加（每行一个标签）</label>
          <textarea value={batchTagText} onChange={e=>setBatchTagText(e.target.value)} placeholder={"标签一\n标签二\n标签三"} rows={5} style={{...inp,resize:"vertical",lineHeight:1.7}} />
          <button onClick={()=>handleAddTags(addTagModal)} style={{...btnP(categories.find(c=>c.id===addTagModal)?.color),width:"100%",marginTop:10}}>批量添加</button>
        </div>
      </Modal>

      <Modal open={!!editTagModal} onClose={()=>setEditTagModal(null)} title="编辑标签">
        <div style={{display:"flex",gap:8}}>
          <input value={editTagText} onChange={e=>setEditTagText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleEditTag()} style={{...inp,flex:1}} autoFocus />
          <button onClick={handleEditTag} style={btnP()}>保存</button>
        </div>
      </Modal>

      <Modal open={addCatModal} onClose={()=>setAddCatModal(false)} title="新增分类">
        <div style={{marginBottom:16}}><label style={lbl}>分类名称</label><input value={newCat.label} onChange={e=>setNewCat(p=>({...p,label:e.target.value}))} placeholder="如：音效描述" style={inp} autoFocus /></div>
        <div style={{marginBottom:16}}><label style={lbl}>选择图标</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {ICON_OPTIONS.map(ic=>(<button key={ic} onClick={()=>setNewCat(p=>({...p,icon:ic}))} style={{width:38,height:38,borderRadius:8,border:newCat.icon===ic?"2px solid #D4A853":"1px solid rgba(255,255,255,0.1)",background:newCat.icon===ic?"rgba(212,168,83,0.15)":"rgba(255,255,255,0.03)",fontSize:18,cursor:"pointer"}}>{ic}</button>))}
          </div>
        </div>
        <div style={{marginBottom:20}}><label style={lbl}>选择颜色</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {COLOR_OPTIONS.map(c=>(<button key={c} onClick={()=>setNewCat(p=>({...p,color:c}))} style={{width:32,height:32,borderRadius:8,border:newCat.color===c?"2.5px solid #fff":"2px solid transparent",background:c,cursor:"pointer"}} />))}
          </div>
        </div>
        <button onClick={handleAddCategory} style={{...btnP(newCat.color),width:"100%"}}>创建分类</button>
      </Modal>

      <Modal open={!!editCatModal} onClose={()=>setEditCatModal(null)} title="编辑分类">
        <div style={{marginBottom:16}}><label style={lbl}>分类名称</label><input value={editCat.label} onChange={e=>setEditCat(p=>({...p,label:e.target.value}))} style={inp} autoFocus /></div>
        <div style={{marginBottom:16}}><label style={lbl}>选择图标</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {ICON_OPTIONS.map(ic=>(<button key={ic} onClick={()=>setEditCat(p=>({...p,icon:ic}))} style={{width:38,height:38,borderRadius:8,border:editCat.icon===ic?"2px solid #D4A853":"1px solid rgba(255,255,255,0.1)",background:editCat.icon===ic?"rgba(212,168,83,0.15)":"rgba(255,255,255,0.03)",fontSize:18,cursor:"pointer"}}>{ic}</button>))}
          </div>
        </div>
        <div style={{marginBottom:20}}><label style={lbl}>选择颜色</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {COLOR_OPTIONS.map(c=>(<button key={c} onClick={()=>setEditCat(p=>({...p,color:c}))} style={{width:32,height:32,borderRadius:8,border:editCat.color===c?"2.5px solid #fff":"2px solid transparent",background:c,cursor:"pointer"}} />))}
          </div>
        </div>
        <button onClick={handleEditCategory} style={{...btnP(editCat.color),width:"100%"}}>保存修改</button>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PromptBuilder />);
</script>
<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(err => {
      console.log('SW registration failed:', err);
    });
  });
}
</script>
</body>
</html>
